<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stack-in-a-Click — Hermes Agent</title>
<style>
  :root {
    --bg: #f8f9fc; --card: #ffffff; --border: #e2e4eb;
    --accent: #635bff; --accent-glow: #7c3aed; --green: #00a878;
    --text: #1a1a2e; --dim: #8b8da0; --radius: 12px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh; padding: 20px;
  }
  .container { max-width: 720px; margin: 0 auto; }

  /* Header */
  .header { text-align: center; margin-bottom: 24px; }
  .header .badge {
    display: inline-block; background: linear-gradient(135deg, var(--accent), #4cc9f0);
    color: #fff; padding: 4px 14px; border-radius: 20px; font-size: 12px;
    font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 12px;
  }
  .header h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
  .header h1 span { background: linear-gradient(135deg, var(--accent), #4cc9f0); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .header p { color: var(--dim); font-size: 14px; margin-top: 4px; }
  .header .meta { font-size: 11px; color: var(--dim); margin-top: 4px; }

  /* Search */
  .search-box {
    width: 100%; padding: 12px 16px; border: 1px solid var(--border);
    border-radius: 10px; font-size: 14px; outline: none; background: var(--card);
    color: var(--text); margin-bottom: 12px;
  }
  .search-box:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(99,91,255,0.1); }

  /* Templates */
  .templates { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
  .tpl-chip {
    padding: 8px 14px; border: 1px solid var(--border); border-radius: 20px;
    font-size: 13px; cursor: pointer; background: var(--card); color: var(--text);
    transition: all 0.2s; user-select: none; white-space: nowrap;
  }
  .tpl-chip:hover { border-color: var(--accent); background: rgba(99,91,255,0.04); }
  .tpl-chip.active { border-color: var(--accent); background: rgba(99,91,255,0.08); color: var(--accent); font-weight: 600; }

  /* Card */
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px; margin-bottom: 16px;
  }

  /* Category */
  .cat-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 0; cursor: pointer; user-select: none;
    border-bottom: 1px solid transparent;
  }
  .cat-header:hover { color: var(--accent); }
  .cat-header .left { display: flex; align-items: center; gap: 10px; }
  .cat-header .icon { font-size: 20px; }
  .cat-header .name { font-weight: 600; font-size: 14px; }
  .cat-header .count { font-size: 12px; color: var(--dim); margin-left: 4px; }
  .cat-header .arrow { font-size: 12px; color: var(--dim); transition: transform 0.2s; }
  .cat-header.open .arrow { transform: rotate(180deg); }
  .cat-header.open { border-bottom-color: var(--border); }

  .cat-body { display: none; padding: 8px 0; }
  .cat-body.show { display: block; }

  /* Service */
  .service {
    display: flex; align-items: center; gap: 10px; padding: 10px 12px;
    border-radius: 8px; cursor: pointer; transition: all 0.15s; user-select: none;
  }
  .service:hover { background: rgba(99,91,255,0.03); }
  .service.selected { background: rgba(99,91,255,0.06); border: 1px solid var(--accent); padding: 9px 11px; }
  .service .s-name { font-weight: 500; font-size: 14px; flex: 1; }
  .service .s-desc { font-size: 12px; color: var(--dim); }
  .service .s-info { flex: 1; }
  .service .tier { font-size: 10px; padding: 2px 8px; border-radius: 5px; font-weight: 500; }
  .tier.free { background: rgba(0,168,120,0.1); color: var(--green); }
  .tier.mixed { background: rgba(99,91,255,0.08); color: var(--accent); }
  .tier.paid { background: #fef2f2; color: #dc2626; }

  /* Button */
  .btn {
    width: 100%; padding: 14px; background: linear-gradient(135deg, var(--accent), #7c3aed);
    color: #fff; border: none; border-radius: 10px; font-size: 16px; font-weight: 600;
    cursor: pointer; transition: all 0.2s; letter-spacing: 0.3px;
  }
  .btn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 8px 30px rgba(99,91,255,0.3); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Status */
  .status {
    text-align: center; padding: 10px; border-radius: 8px; margin-top: 10px;
    font-size: 13px; display: none;
  }
  .status.show { display: block; }
  .status.loading { background: rgba(99,91,255,0.08); color: var(--accent-glow); }
  .status.success { background: rgba(0,168,120,0.08); color: var(--green); }
  .status.error { background: rgba(255,77,77,0.08); color: #dc2626; }

  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid transparent; border-top-color: currentColor; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Results */
  .result-item { display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: 14px; }
  .result-item .check { color: var(--green); font-weight: bold; }
  .result-item .fail { color: #dc2626; font-weight: bold; }

  .env-output { display: none; }
  .copy-btn {
    margin-top: 8px; padding: 8px 16px; background: var(--border); border: none;
    color: var(--text); border-radius: 6px; font-size: 12px; cursor: pointer;
    display: none;
  }
  .copy-btn:hover { background: var(--accent); color: #fff; }

  .summary-bar {
    text-align: center; padding: 8px; color: var(--dim); font-size: 13px;
  }

  /* Footer */
  .footer { text-align: center; margin-top: 16px; font-size: 11px; color: var(--dim); }
  .footer a { color: var(--accent); text-decoration: none; }

  /* Header sticky */
  .sticky-bar {
    position: sticky; top: 0; background: var(--bg); z-index: 10;
    padding-bottom: 8px;
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="badge">Hermes Agent + Stripe Projects</div>
    <h1>Stack-<span>in-a-Click</span></h1>
    <p>Provision your SaaS stack with one click. Select services, get your .env.</p>
    <p class="meta" id="catalog-meta"></p>
  </div>

  <div class="sticky-bar">
    <input class="search-box" id="search" placeholder="🔍 Search 57 services across 13 categories..." oninput="filterServices()">
    <div class="templates" id="templates"></div>
    <div class="summary-bar" id="summary"></div>
  </div>

  <div class="card" id="categories-card">
    <div id="categories"></div>
    <button class="btn" id="provision-btn" onclick="provision()">
      🚀 Provision Selected Services
    </button>
    <div class="status" id="status"></div>
  </div>

  <div class="card" id="results-card" style="display:none">
    <h3 style="font-size:13px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">📦 Result</h3>
    <div class="result-list" id="result-list"></div>
    <div class="env-output" id="env-output"></div>
    <button class="copy-btn" id="copy-btn" onclick="copyEnv()">📋 Copy .env</button>
  </div>

  <div class="footer">
    Built with <a href="https://hermes-agent.nousresearch.com" target="_blank">Hermes Agent</a> ·
    <a href="https://stripe.com" target="_blank">Stripe</a> ·
    <a href="https://nvidia.com" target="_blank">NVIDIA</a> ·
    Hackathon 2026
  </div>
</div>

<script>
const API = window.location.origin;
let catalog = null;
let selected = new Set();
let activeTemplate = null;

async function init() {
  try {
    const res = await fetch(`${API}/api/services`);
    catalog = await res.json();
    document.getElementById('catalog-meta').textContent =
      `${catalog.total_services} services · ${Object.keys(catalog.categories).length} categories · ${Object.keys(catalog.templates).length} templates`;
    renderTemplates();
    renderCategories();
  } catch(e) {
    document.getElementById('categories').innerHTML = '<p style="color:#dc2626">Failed to load catalog.</p>';
  }
}

function renderTemplates() {
  const tpl = document.getElementById('templates');
  tpl.innerHTML = Object.entries(catalog.templates).map(([id, t]) =>
    `<span class="tpl-chip" data-tpl="${id}" onclick="loadTemplate('${id}')">${t.name}</span>`
  ).join('');
}

function loadTemplate(id) {
  activeTemplate = id;
  selected.clear();
  catalog.templates[id].services.forEach(s => selected.add(s));

  document.querySelectorAll('.tpl-chip').forEach(c => c.classList.toggle('active', c.dataset.tpl === id));
  updateUI();
}

function renderCategories() {
  const container = document.getElementById('categories');
  container.innerHTML = Object.entries(catalog.categories).map(([cat, data]) => `
    <div class="cat-group" data-cat="${cat}">
      <div class="cat-header open" onclick="toggleCat(this)">
        <div class="left">
          <span class="icon">${data.icon}</span>
          <span class="name">${cat}</span>
          <span class="count">${data.services.length}</span>
        </div>
        <span class="arrow">▼</span>
      </div>
      <div class="cat-body show">
        ${data.services.map(s => `
          <div class="service${selected.has(s.id) ? ' selected' : ''}" data-svc="${s.id}"
               onclick="toggleService('${s.id}', this)">
            <div class="s-info">
              <div class="s-name">${s.name}</div>
              <div class="s-desc">${s.desc}</div>
            </div>
            <span class="tier ${s.tier}">${s.tier === 'free' ? 'Free' : s.tier === 'mixed' ? 'Free+Paid' : 'Paid'}</span>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

function toggleCat(header) {
  header.classList.toggle('open');
  header.nextElementSibling.classList.toggle('show');
}

function toggleService(id, el) {
  if (selected.has(id)) { selected.delete(id); el.classList.remove('selected'); }
  else { selected.add(id); el.classList.add('selected'); }
  activeTemplate = null;
  document.querySelectorAll('.tpl-chip').forEach(c => c.classList.remove('active'));
  updateSummary();
}

function updateUI() {
  // Re-render categories to reflect selection state
  document.querySelectorAll('.service').forEach(el => {
    el.classList.toggle('selected', selected.has(el.dataset.svc));
  });
  updateSummary();
}

function updateSummary() {
  const n = selected.size;
  document.getElementById('summary').textContent = n > 0
    ? `${n} service${n>1?'s':''} selected · ready to provision`
    : '';
}

function filterServices() {
  const q = document.getElementById('search').value.toLowerCase();
  document.querySelectorAll('.cat-group').forEach(group => {
    const services = group.querySelectorAll('.service');
    let visible = 0;
    services.forEach(svc => {
      const text = (svc.querySelector('.s-name').textContent + svc.querySelector('.s-desc').textContent).toLowerCase();
      const match = !q || text.includes(q);
      svc.style.display = match ? '' : 'none';
      if (match) visible++;
    });
    group.style.display = visible > 0 ? '' : 'none';
  });
}

async function provision() {
  if (selected.size === 0) {
    showStatus('Select at least one service!', 'error');
    return;
  }

  const btn = document.getElementById('provision-btn');
  btn.disabled = true;
  showStatus('<span class="spinner"></span>Provisioning via Stripe Projects...', 'loading');

  try {
    const res = await fetch(`${API}/api/provision`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ providers: [...selected] }),
    });
    const data = await res.json();

    document.getElementById('results-card').style.display = 'block';
    const resultList = document.getElementById('result-list');
    resultList.innerHTML = '';
    data.provisioned.forEach(r => {
      resultList.innerHTML += `<div class="result-item"><span class="check">✓</span> ${r.name || r.provider}</div>`;
    });
    data.errors.forEach(r => {
      resultList.innerHTML += `<div class="result-item"><span class="fail">✗</span> ${r.provider}: ${r.error}</div>`;
    });

    const envDiv = document.getElementById('env-output');
    const copyBtn = document.getElementById('copy-btn');
    if (data.env?.trim()) {
      envDiv.textContent = data.env;
      copyBtn.style.display = 'inline-block';
    }

    showStatus(data.message, data.success ? 'success' : 'error');
    selected.clear();
    activeTemplate = null;
    document.querySelectorAll('.tpl-chip').forEach(c => c.classList.remove('active'));
    updateUI();

  } catch(e) {
    showStatus('Connection error: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
  }
}

function showStatus(msg, type) {
  const s = document.getElementById('status');
  s.innerHTML = msg;
  s.className = 'status show ' + type;
}

function copyEnv() {
  navigator.clipboard.writeText(document.getElementById('env-output').textContent).then(() => {
    showStatus('✅ .env copied to clipboard!', 'success');
  });
}

init();
</script>
</body>
</html>
